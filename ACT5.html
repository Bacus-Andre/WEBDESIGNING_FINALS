<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACTIVITY 5</title>
    <link rel="stylesheet" text=href="css/style.css">
</head>
<body>
    <div class="hero">
        <div class="content">
            <h1> You Wanna See Some Cool Dog?~ </h1>
            <h2>  Click the "Hell Yeah!" below </h2>
            <a href="https://i.pinimg.com/736x/f7/ad/11/f7ad113b9bdb77c2763387af18bae787.jpg" class="button" target="_blank">
                 Hell Yeah!
            </a>
        </div>
    </div>
    <style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
    }
    .hero {
        min-height: 100vh;
        background-image: url(https://s3.envato.com/files/263200089/evil%20emoticon%20with%20wringing%20hands%20preview.jpg);
        background-repeat: no-repeat;
        background-size: cover;
        background-position: center;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .content {
        text-align: center;
    }
    .content h1 {
        font-size: 65px;
        color: rgb(0, 0, 0);
        margin-bottom: 20px;
    }
    .content h2 {
        font-size: 50px;
        color: rgb(255, 12, 17);
        margin-bottom: 30px;
    }
    .content .button {
        display: inline-block;
        padding: 15px 30px;
        font-size: 60px;
        color: white;
        background-color: rgb(255, 0, 0);
        text-decoration: none;
        border-radius: 5px;
        transition: background-color 0.3s ease;
    }
    .content .button:hover {
        background-color: rgb(4, 75, 255);
    }
</style>
</body>
</html>
